<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym">
<meta name="theme-color" content="#0b0d10">
<link rel="manifest" href="manifest.json">
<title>Gym Tracker</title>
<style>
  :root {
    --bg: #0b0d10;
    --card: #14181d;
    --card-2: #1b2026;
    --border: #262c34;
    --text: #e6edf3;
    --muted: #8b98a5;
    --accent: #4ade80;
    --accent-2: #22d3ee;
    --danger: #f87171;
    --warn: #fbbf24;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 16px; line-height: 1.4;
    overscroll-behavior-y: contain;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right) calc(env(safe-area-inset-bottom) + 72px) env(safe-area-inset-left);
    min-height: 100vh;
  }
  header {
    padding: 16px 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 20px; margin: 0; letter-spacing: -0.02em; }
  header .date { color: var(--muted); font-size: 13px; }
  main { padding: 8px 16px 16px; max-width: 640px; margin: 0 auto; }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; margin-bottom: 12px;
  }
  .row-between { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .muted { color: var(--muted); font-size: 13px; }
  .title { font-size: 15px; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 18px 4px 8px; }
  button, .btn {
    background: var(--card-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; font-size: 15px; font-weight: 500;
    cursor: pointer; touch-action: manipulation;
    transition: background .12s, transform .06s;
    font-family: inherit;
  }
  button:active, .btn:active { transform: scale(0.98); }
  @media (hover: hover) {
    button:hover, .btn:hover {
      border-color: rgba(74, 222, 128, 0.45);
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.18);
      background: color-mix(in srgb, var(--card-2) 82%, white 4%);
    }
    button.ghost:hover {
      background: rgba(74, 222, 128, 0.06);
    }
    button.primary:hover, .btn.primary:hover {
      border-color: transparent;
      box-shadow: 0 0 24px rgba(74, 222, 128, 0.5);
      filter: brightness(1.08);
      background: var(--accent);
    }
    button.danger:hover {
      background: rgba(248, 113, 113, 0.08);
      box-shadow: 0 0 12px rgba(248, 113, 113, 0.22);
      border-color: rgba(248, 113, 113, 0.4);
    }
    input:hover {
      border-color: rgba(74, 222, 128, 0.3);
    }
    .sug-item:hover {
      background: rgba(74, 222, 128, 0.08);
    }
    nav.tabs button:hover {
      color: var(--accent);
      background: transparent;
      box-shadow: none;
      border-color: transparent;
    }
    .stat:hover {
      border-color: rgba(74, 222, 128, 0.3);
      box-shadow: 0 0 14px rgba(74, 222, 128, 0.1);
    }
  }
  button.primary, .btn.primary { background: var(--accent); color: #062710; border-color: transparent; font-weight: 600; }
  button.ghost { background: transparent; border-color: var(--border); }
  button.danger { background: transparent; color: var(--danger); border-color: transparent; padding: 8px; }
  button.small { padding: 6px 10px; font-size: 13px; }
  button.block { width: 100%; }
  input, select {
    background: var(--card-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 12px; font-size: 16px; width: 100%;
    font-family: inherit; outline: none;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--accent); }
  input[type="number"] { text-align: center; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .set-row {
    display: grid; grid-template-columns: 28px 1fr 1fr 36px;
    gap: 8px; align-items: center; margin-bottom: 8px;
  }
  .set-num { color: var(--muted); font-size: 13px; text-align: center; }
  nav.tabs {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(11,13,16,0.92);
    backdrop-filter: saturate(160%) blur(16px);
    -webkit-backdrop-filter: saturate(160%) blur(16px);
    border-top: 1px solid var(--border);
    display: grid; grid-template-columns: repeat(4, 1fr);
    padding: 8px 8px calc(env(safe-area-inset-bottom) + 8px);
    z-index: 10;
  }
  nav.tabs button {
    background: transparent; border: none; color: var(--muted);
    font-size: 11px; padding: 6px 4px; display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  nav.tabs button.active { color: var(--accent); }
  nav.tabs .icon { font-size: 20px; line-height: 1; }
  .view { display: none; }
  .view.active { display: block; }
  .exercise-block {
    background: var(--card-2); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; margin-bottom: 10px;
  }
  .exercise-block .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
  .exercise-block .ex-name { font-weight: 600; font-size: 15px; }
  .pill {
    display: inline-block; padding: 3px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: rgba(74, 222, 128, 0.12); color: var(--accent);
    border: 1px solid rgba(74, 222, 128, 0.25);
  }
  .pill.warn { background: rgba(251, 191, 36, 0.12); color: var(--warn); border-color: rgba(251,191,36,0.25); }
  .pill.info { background: rgba(34, 211, 238, 0.12); color: var(--accent-2); border-color: rgba(34,211,238,0.25); }
  .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .history-item:last-child { border-bottom: none; }
  .history-ex { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 14px; }
  .rec-line { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; font-size: 14px; }
  .rec-line .arrow { color: var(--muted); margin: 0 6px; }
  .rec-line .from { color: var(--muted); }
  .rec-line .to { font-weight: 600; color: var(--accent); }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat { background: var(--card-2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
  .stat .v { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .stat .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .toast {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(env(safe-area-inset-bottom) + 90px);
    background: var(--card-2); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 999px; font-size: 14px;
    z-index: 20; opacity: 0; transition: opacity .2s, transform .2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  .autocomplete-wrap { position: relative; }
  .sug-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--card-2); border: 1px solid var(--border); border-radius: 10px;
    margin-top: 4px; max-height: 180px; overflow-y: auto; z-index: 5;
    display: none;
  }
  .sug-item { padding: 10px 12px; font-size: 14px; cursor: pointer; }
  .sug-item:hover, .sug-item.active { background: var(--card); }
  .hidden { display: none; }
  hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
</style>
</head>
<body>

<header>
  <h1>Gym Tracker</h1>
  <span class="date" id="todayDate"></span>
</header>

<main>
  <section class="view active" id="view-home">
    <div class="stat-grid">
      <div class="stat"><div class="v" id="statSessions">0</div><div class="l">Sessions</div></div>
      <div class="stat"><div class="v" id="statVolume">0</div><div class="l">Total kg</div></div>
      <div class="stat"><div class="v" id="statStreak">0</div><div class="l">Day streak</div></div>
    </div>
    <div class="section-title">Quick Actions</div>
    <button class="btn primary block" id="btnGotoLog">+ Log Workout</button>
    <div style="height: 8px"></div>
    <button class="btn block" id="btnGotoPlan">View Next Workout Plan</button>
    <div class="section-title">Recent</div>
    <div id="recentList" class="card"></div>
  </section>

  <section class="view" id="view-log">
    <div class="card">
      <div class="row-between">
        <div>
          <div class="title" style="margin-bottom:2px">New Session</div>
          <div class="muted" id="logDate"></div>
        </div>
        <button class="small ghost" id="btnCopyLast">Copy last</button>
      </div>
    </div>
    <div id="exerciseList"></div>
    <button class="btn block" id="btnAddExercise">+ Add Exercise</button>
    <div style="height: 10px"></div>
    <button class="btn primary block" id="btnSaveWorkout">Save Workout</button>
    <div style="height: 6px"></div>
    <button class="btn ghost block" id="btnDiscardWorkout">Discard</button>
  </section>

  <section class="view" id="view-plan">
    <div class="card">
      <div class="title">Next Workout Plan</div>
      <div class="muted">Progressive overload based on your last session per exercise. Hit all reps → +weight. Miss reps → same weight. Stall 2+ sessions → deload 10%.</div>
    </div>
    <div id="planList"></div>
  </section>

  <section class="view" id="view-history">
    <div class="card">
      <div class="title">History</div>
      <div class="muted">All past sessions. Tap to expand.</div>
    </div>
    <div id="historyList"></div>
    <div style="height: 8px"></div>
    <div class="card">
      <div class="title">Data</div>
      <div class="grid-2">
        <button class="small" id="btnExport">Export JSON</button>
        <button class="small" id="btnImport">Import JSON</button>
      </div>
      <div style="height: 8px"></div>
      <button class="small danger block" id="btnClearAll">Delete All Data</button>
    </div>
  </section>
</main>

<nav class="tabs">
  <button data-tab="home" class="active"><span class="icon">🏠</span><span>Home</span></button>
  <button data-tab="log"><span class="icon">➕</span><span>Log</span></button>
  <button data-tab="plan"><span class="icon">📈</span><span>Plan</span></button>
  <button data-tab="history"><span class="icon">📅</span><span>History</span></button>
</nav>

<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  const STORAGE_KEY = "gym_tracker_v1";
  const DRAFT_KEY = "gym_tracker_draft_v1";

  const state = { workouts: [], draft: null };

  // ---------- STORAGE ----------
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      state.workouts = raw ? JSON.parse(raw) : [];
    } catch (_) { state.workouts = []; }
    try {
      const d = localStorage.getItem(DRAFT_KEY);
      state.draft = d ? JSON.parse(d) : null;
    } catch (_) { state.draft = null; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.workouts)); }
  function saveDraft() {
    if (state.draft) localStorage.setItem(DRAFT_KEY, JSON.stringify(state.draft));
    else localStorage.removeItem(DRAFT_KEY);
  }

  // ---------- UTIL ----------
  function fmtDate(iso, opts) {
    const d = new Date(iso);
    return d.toLocaleDateString(undefined, opts || { month: "short", day: "numeric", year: "numeric" });
  }
  function todayISO() { return new Date().toISOString(); }
  function uid() { return Math.random().toString(36).slice(2, 10); }
  function escapeHTML(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // Force the browser to flush pending style/layout changes. Some environments
  // batch DOM mutations made inside a click handler until the next "natural"
  // layout trigger (like a navigation) — this forces an immediate recalculation
  // and paint of the currently visible view.
  function forceRepaint() {
    const active = document.querySelector(".view.active");
    if (!active) return;
    // Reading offsetHeight forces synchronous layout.
    void active.offsetHeight;
    // Toggling a style triggers a repaint without visible flicker.
    active.style.transform = "translateZ(0)";
    requestAnimationFrame(function () {
      active.style.transform = "";
    });
  }

  let toastTimer = null;
  function toast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
  }

  // ---------- NAVIGATION ----------
  function goTo(tab) {
    document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
    const view = document.getElementById("view-" + tab);
    if (view) view.classList.add("active");
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    if (tab === "home") renderHome();
    if (tab === "log") renderLog();
    if (tab === "plan") renderPlan();
    if (tab === "history") renderHistory();
    window.scrollTo(0, 0);
  }

  // ---------- HOME ----------
  function renderHome() {
    const sessions = state.workouts.length;
    let totalVolume = 0;
    for (const w of state.workouts) {
      for (const ex of w.exercises) {
        for (const s of ex.sets) {
          totalVolume += (s.reps || 0) * (s.weight || 0);
        }
      }
    }
    document.getElementById("statSessions").textContent = sessions;
    document.getElementById("statVolume").textContent = Math.round(totalVolume).toLocaleString();
    document.getElementById("statStreak").textContent = computeStreak();

    const recent = state.workouts.slice().sort((a, b) => b.date.localeCompare(a.date)).slice(0, 3);
    const el = document.getElementById("recentList");
    if (recent.length === 0) {
      el.innerHTML = '<div class="empty">No sessions yet. Log your first workout!</div>';
    } else {
      el.innerHTML = recent.map(w => `
        <div class="history-item">
          <div class="row-between">
            <strong>${fmtDate(w.date)}</strong>
            <span class="muted">${w.exercises.length} exercise${w.exercises.length === 1 ? "" : "s"}</span>
          </div>
          <div class="history-ex">${escapeHTML(w.exercises.map(e => e.name).join(" · "))}</div>
        </div>
      `).join("");
    }
  }

  function computeStreak() {
    if (state.workouts.length === 0) return 0;
    const dateSet = new Set(state.workouts.map(w => w.date.slice(0, 10)));
    let streak = 0;
    const d = new Date();
    // Allow today-not-trained
    if (!dateSet.has(d.toISOString().slice(0, 10))) d.setDate(d.getDate() - 1);
    while (dateSet.has(d.toISOString().slice(0, 10))) {
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  // ---------- LOG ----------
  function ensureDraft() {
    if (!state.draft) {
      state.draft = { date: todayISO(), exercises: [] };
      saveDraft();
    }
  }

  function renderLog() {
    ensureDraft();
    document.getElementById("logDate").textContent = fmtDate(state.draft.date, { weekday: "long", month: "long", day: "numeric" });
    const list = document.getElementById("exerciseList");
    list.innerHTML = "";
    if (state.draft.exercises.length === 0) {
      list.innerHTML = '<div class="empty">No exercises yet. Tap "Add Exercise".</div>';
      return;
    }
    state.draft.exercises.forEach((ex, exIdx) => list.appendChild(renderExerciseBlock(ex, exIdx)));
  }

  function renderExerciseBlock(ex, exIdx) {
    const div = document.createElement("div");
    div.className = "exercise-block";
    div.innerHTML = `
      <div class="ex-header">
        <div style="flex:1">
          <div class="autocomplete-wrap">
            <input type="text" placeholder="Exercise name (e.g. Bench Press)" value="${escapeHTML(ex.name)}" class="ex-name-input" autocomplete="off">
            <div class="sug-list"></div>
          </div>
        </div>
        <button type="button" class="danger small btn-remove-ex">✕</button>
      </div>
      <div class="set-row" style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px">
        <div></div><div style="text-align:center">Reps</div><div style="text-align:center">kg</div><div></div>
      </div>
      <div class="sets-container"></div>
      <div class="grid-2" style="margin-top:8px">
        <button type="button" class="small btn-add-set">+ Set</button>
        <button type="button" class="small ghost btn-suggest">Suggest weights</button>
      </div>
    `;

    // Build set rows
    const setsContainer = div.querySelector(".sets-container");
    ex.sets.forEach((s, setIdx) => setsContainer.appendChild(buildSetRow(exIdx, setIdx, s)));

    // Name input
    const nameInput = div.querySelector(".ex-name-input");
    const sugList = div.querySelector(".sug-list");
    nameInput.addEventListener("input", (e) => {
      state.draft.exercises[exIdx].name = e.target.value;
      saveDraft();
      showSuggestions(e.target, sugList, exIdx);
    });
    nameInput.addEventListener("focus", (e) => showSuggestions(e.target, sugList, exIdx));
    nameInput.addEventListener("blur", () => setTimeout(() => { sugList.style.display = "none"; }, 150));

    // Remove exercise
    div.querySelector(".btn-remove-ex").addEventListener("click", () => {
      state.draft.exercises.splice(exIdx, 1);
      saveDraft();
      renderLog();
      forceRepaint();
    });

    // Add set
    div.querySelector(".btn-add-set").addEventListener("click", () => {
      const last = ex.sets[ex.sets.length - 1] || { reps: 8, weight: 0 };
      ex.sets.push({ reps: last.reps, weight: last.weight });
      saveDraft();
      renderLog();
      forceRepaint();
    });

    // Suggest
    div.querySelector(".btn-suggest").addEventListener("click", () => suggestForExercise(exIdx));

    return div;
  }

  function buildSetRow(exIdx, setIdx, s) {
    const row = document.createElement("div");
    row.className = "set-row";

    const numDiv = document.createElement("div");
    numDiv.className = "set-num";
    numDiv.textContent = String(setIdx + 1);

    const repsInput = document.createElement("input");
    repsInput.type = "number";
    repsInput.inputMode = "numeric";
    repsInput.min = "0";
    repsInput.step = "1";
    repsInput.placeholder = "0";
    repsInput.value = s.reps === 0 ? "" : String(s.reps);
    repsInput.addEventListener("input", (e) => {
      const v = e.target.value === "" ? 0 : Number(e.target.value);
      state.draft.exercises[exIdx].sets[setIdx].reps = isNaN(v) ? 0 : v;
      saveDraft();
    });

    const weightInput = document.createElement("input");
    weightInput.type = "number";
    weightInput.inputMode = "decimal";
    weightInput.min = "0";
    weightInput.step = "0.5";
    weightInput.placeholder = "0";
    weightInput.value = s.weight === 0 ? "" : String(s.weight);
    weightInput.addEventListener("input", (e) => {
      const v = e.target.value === "" ? 0 : Number(e.target.value);
      state.draft.exercises[exIdx].sets[setIdx].weight = isNaN(v) ? 0 : v;
      saveDraft();
    });

    const removeBtn = document.createElement("button");
    removeBtn.type = "button";
    removeBtn.className = "danger small";
    removeBtn.textContent = "−";
    removeBtn.addEventListener("click", () => {
      state.draft.exercises[exIdx].sets.splice(setIdx, 1);
      if (state.draft.exercises[exIdx].sets.length === 0) {
        state.draft.exercises[exIdx].sets.push({ reps: 8, weight: 0 });
      }
      saveDraft();
      renderLog();
      forceRepaint();
    });

    row.appendChild(numDiv);
    row.appendChild(repsInput);
    row.appendChild(weightInput);
    row.appendChild(removeBtn);
    return row;
  }

  function getKnownExerciseNames() {
    const set = new Set();
    for (const w of state.workouts) {
      for (const ex of w.exercises) {
        if (ex.name && ex.name.trim()) set.add(ex.name.trim());
      }
    }
    return [...set].sort((a, b) => a.localeCompare(b));
  }

  function showSuggestions(input, list, exIdx) {
    const names = getKnownExerciseNames();
    const q = (input.value || "").toLowerCase().trim();
    const filtered = names.filter(n => q === "" || n.toLowerCase().includes(q)).slice(0, 6);
    if (filtered.length === 0) { list.style.display = "none"; return; }
    list.innerHTML = "";
    filtered.forEach(n => {
      const item = document.createElement("div");
      item.className = "sug-item";
      item.textContent = n;
      item.addEventListener("mousedown", (e) => e.preventDefault());
      item.addEventListener("click", () => {
        state.draft.exercises[exIdx].name = n;
        saveDraft();
        renderLog();
      });
      list.appendChild(item);
    });
    list.style.display = "block";
  }

  function addExerciseBlock() {
    ensureDraft();
    state.draft.exercises.push({ name: "", sets: [{ reps: 8, weight: 0 }] });
    saveDraft();
    renderLog();
    forceRepaint();
    setTimeout(() => {
      const inputs = document.querySelectorAll(".ex-name-input");
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 30);
  }

  function suggestForExercise(exIdx) {
    const ex = state.draft.exercises[exIdx];
    if (!ex.name || !ex.name.trim()) { toast("Name the exercise first"); return; }
    const rec = recommendFor(ex.name.trim());
    if (!rec) { toast("No history for this exercise"); return; }
    ex.sets = [];
    for (let i = 0; i < rec.sets; i++) ex.sets.push({ reps: rec.reps, weight: rec.weight });
    saveDraft();
    renderLog();
    toast("Targets filled from plan");
  }

  function saveWorkout() {
    if (!state.draft || state.draft.exercises.length === 0) { toast("Add at least one exercise"); return; }
    const cleaned = {
      id: uid(),
      date: state.draft.date,
      exercises: state.draft.exercises
        .map(e => ({
          name: (e.name || "").trim(),
          sets: e.sets
            .filter(s => (s.reps || 0) > 0)
            .map(s => ({ reps: Number(s.reps) || 0, weight: Number(s.weight) || 0 })),
        }))
        .filter(e => e.name && e.sets.length > 0),
    };
    if (cleaned.exercises.length === 0) { toast("Fill in reps for your sets"); return; }
    state.workouts.push(cleaned);
    state.draft = null;
    save();
    saveDraft();
    toast("Workout saved");
    goTo("home");
  }

  function cancelWorkout() {
    if (!state.draft || state.draft.exercises.length === 0) { goTo("home"); return; }
    if (confirm("Discard this session?")) {
      state.draft = null;
      saveDraft();
      goTo("home");
    }
  }

  function loadLastSessionTemplate() {
    if (state.workouts.length === 0) { toast("No history to copy"); return; }
    const last = state.workouts.slice().sort((a, b) => b.date.localeCompare(a.date))[0];
    ensureDraft();
    state.draft.exercises = last.exercises.map(ex => {
      const rec = recommendFor(ex.name);
      const sets = rec
        ? Array.from({ length: rec.sets }, () => ({ reps: rec.reps, weight: rec.weight }))
        : ex.sets.map(s => ({ reps: s.reps, weight: s.weight }));
      return { name: ex.name, sets };
    });
    saveDraft();
    renderLog();
    toast("Copied last session with targets");
  }

  // ---------- RECOMMENDATION ENGINE ----------
  function historyFor(name) {
    const norm = name.toLowerCase().trim();
    return state.workouts
      .filter(w => w.exercises.some(e => e.name.toLowerCase().trim() === norm))
      .sort((a, b) => b.date.localeCompare(a.date))
      .map(w => ({
        date: w.date,
        sets: w.exercises.find(e => e.name.toLowerCase().trim() === norm).sets,
      }));
  }

  function roundTo(x, step) { return Math.round(x / step) * step; }

  function recommendFor(name) {
    const hist = historyFor(name);
    if (hist.length === 0) return null;

    const last = hist[0];
    const prev = hist[1];
    const prev2 = hist[2];

    if (!last.sets || last.sets.length === 0) return null;

    const avgReps = last.sets.reduce((a, s) => a + (s.reps || 0), 0) / last.sets.length;
    const maxWeight = Math.max.apply(null, last.sets.map(s => s.weight || 0));
    const baseSets = last.sets.length;
    const targetReps = Math.max.apply(null, last.sets.map(s => s.reps || 0));

    let recWeight = maxWeight;
    let recReps = targetReps;
    let recSets = baseSets;
    let note = "";

    const hitAll = last.sets.every(s => (s.reps || 0) >= targetReps);

    const stalled = prev && (
      Math.max.apply(null, prev.sets.map(s => s.weight || 0)) >= maxWeight &&
      (prev.sets.reduce((a, s) => a + (s.reps || 0), 0) / prev.sets.length) >= avgReps
    );
    const doubleStalled = stalled && prev2 && (
      Math.max.apply(null, prev2.sets.map(s => s.weight || 0)) >= maxWeight &&
      (prev2.sets.reduce((a, s) => a + (s.reps || 0), 0) / prev2.sets.length) >= avgReps
    );

    if (doubleStalled) {
      recWeight = roundTo(maxWeight * 0.9, 0.5);
      recReps = Math.max(6, targetReps);
      note = "Deload 10% — 2+ stalled sessions. Rebuild with clean reps.";
    } else if (hitAll) {
      const step = maxWeight < 10 ? 1 : maxWeight < 25 ? 2 : 2.5;
      recWeight = roundTo(maxWeight + step, 0.5);
      recReps = targetReps;
      note = "You hit every rep. Bump weight by " + step + "kg.";
    } else if (avgReps < targetReps - 1) {
      recWeight = maxWeight;
      recReps = Math.max(5, targetReps - 1);
      note = "Reps dropped — hold weight, drop target by 1 to dial it in.";
    } else {
      recWeight = maxWeight;
      recReps = targetReps;
      note = "Close, but not every set. Same weight, same target — finish all sets.";
    }

    return {
      weight: recWeight,
      reps: recReps,
      sets: recSets,
      lastWeight: maxWeight,
      lastReps: targetReps,
      lastSets: baseSets,
      note,
      hitAll,
      stalled: doubleStalled,
    };
  }

  // ---------- PLAN ----------
  function renderPlan() {
    const el = document.getElementById("planList");
    const names = getKnownExerciseNames();
    if (names.length === 0) {
      el.innerHTML = '<div class="card empty">Log a session first to get recommendations.</div>';
      return;
    }
    el.innerHTML = names.map(name => {
      const rec = recommendFor(name);
      if (!rec) return "";
      const pill = rec.stalled ? '<span class="pill warn">Deload</span>'
                : rec.hitAll ? '<span class="pill">+Weight</span>'
                : '<span class="pill info">Hold</span>';
      return `
        <div class="card">
          <div class="ex-header row-between">
            <div class="ex-name">${escapeHTML(name)}</div>
            ${pill}
          </div>
          <div class="rec-line">
            <span>Weight</span>
            <span><span class="from">${rec.lastWeight}kg</span><span class="arrow">→</span><span class="to">${rec.weight}kg</span></span>
          </div>
          <div class="rec-line">
            <span>Reps</span>
            <span><span class="from">${rec.lastReps}</span><span class="arrow">→</span><span class="to">${rec.reps}</span></span>
          </div>
          <div class="rec-line">
            <span>Sets</span>
            <span><span class="to">${rec.sets}</span></span>
          </div>
          <hr>
          <div class="muted" style="font-size:13px">${escapeHTML(rec.note)}</div>
        </div>
      `;
    }).join("");
  }

  // ---------- HISTORY ----------
  function renderHistory() {
    const el = document.getElementById("historyList");
    if (state.workouts.length === 0) {
      el.innerHTML = '<div class="card empty">No sessions yet.</div>';
      return;
    }
    const sorted = state.workouts.slice().sort((a, b) => b.date.localeCompare(a.date));
    el.innerHTML = "";
    sorted.forEach(w => {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <div class="row-between" style="cursor:pointer">
          <strong>${fmtDate(w.date, { weekday: "short", month: "short", day: "numeric", year: "numeric" })}</strong>
          <span class="muted">${w.exercises.length} ex · ${w.exercises.reduce((a, e) => a + e.sets.length, 0)} sets</span>
        </div>
        <div class="detail hidden" style="margin-top:10px">
          ${w.exercises.map(ex => `
            <div style="margin-bottom:10px">
              <div style="font-weight:600;font-size:14px;margin-bottom:4px">${escapeHTML(ex.name)}</div>
              <div class="muted" style="font-size:13px">
                ${ex.sets.map(s => `${s.reps}×${s.weight}kg`).join(" · ")}
              </div>
            </div>
          `).join("")}
          <button type="button" class="small danger btn-delete-session">Delete session</button>
        </div>
      `;
      const toggle = card.querySelector(".row-between");
      const detail = card.querySelector(".detail");
      toggle.addEventListener("click", () => detail.classList.toggle("hidden"));
      card.querySelector(".btn-delete-session").addEventListener("click", () => deleteWorkout(w.id));
      el.appendChild(card);
    });
  }

  function deleteWorkout(id) {
    if (!confirm("Delete this session?")) return;
    state.workouts = state.workouts.filter(w => w.id !== id);
    save();
    renderHistory();
    toast("Deleted");
  }

  // ---------- DATA ----------
  function exportData() {
    const blob = new Blob([JSON.stringify(state.workouts, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "gym-tracker-" + new Date().toISOString().slice(0, 10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importData() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json";
    input.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const r = new FileReader();
      r.onload = () => {
        try {
          const parsed = JSON.parse(r.result);
          if (!Array.isArray(parsed)) throw new Error("bad format");
          if (confirm("Import " + parsed.length + " sessions? This replaces current data.")) {
            state.workouts = parsed;
            save();
            toast("Imported");
            goTo("home");
          }
        } catch (_) { alert("Invalid JSON file."); }
      };
      r.readAsText(file);
    });
    input.click();
  }

  function clearAll() {
    if (!confirm("Delete ALL sessions? This cannot be undone.")) return;
    if (!confirm("Really delete everything?")) return;
    state.workouts = [];
    save();
    toast("All data cleared");
    goTo("home");
  }

  // ---------- INIT ----------
  function init() {
    load();
    document.getElementById("todayDate").textContent = fmtDate(todayISO(), { weekday: "short", month: "short", day: "numeric" });

    // Tab bar
    document.querySelectorAll("nav.tabs button").forEach(b => {
      b.addEventListener("click", () => goTo(b.dataset.tab));
    });

    // Home buttons
    document.getElementById("btnGotoLog").addEventListener("click", () => goTo("log"));
    document.getElementById("btnGotoPlan").addEventListener("click", () => goTo("plan"));

    // Log view buttons
    document.getElementById("btnAddExercise").addEventListener("click", addExerciseBlock);
    document.getElementById("btnSaveWorkout").addEventListener("click", saveWorkout);
    document.getElementById("btnDiscardWorkout").addEventListener("click", cancelWorkout);
    document.getElementById("btnCopyLast").addEventListener("click", loadLastSessionTemplate);

    // History view buttons
    document.getElementById("btnExport").addEventListener("click", exportData);
    document.getElementById("btnImport").addEventListener("click", importData);
    document.getElementById("btnClearAll").addEventListener("click", clearAll);

    goTo("home");

    // Clean up any previously-registered service worker that may be caching stale assets.
    if ("serviceWorker" in navigator && navigator.serviceWorker.getRegistrations) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys().then(function (keys) {
        keys.forEach(function (k) { caches.delete(k); });
      }).catch(function () {});
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
